<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Green rounded background -->
  <rect width="512" height="512" rx="110" fill="#16a34a" />
  <!-- Fridge body outer -->
  <rect x="130" y="80" width="252" height="352" rx="28" fill="#ffffff" />
  <!-- Freezer section (top ~35%) -->
  <rect x="130" y="80" width="252" height="134" rx="28" fill="#f0fdf4" />
  <!-- Separator line -->
  <rect x="130" y="208" width="252" height="10" fill="#dcfce7" />
  <!-- Fridge door separator (vertical center line) -->
  <rect x="254" y="218" width="3" height="214" rx="1.5" fill="#dcfce7" />
  <!-- Freezer handle left -->
  <rect x="160" y="116" width="14" height="56" rx="7" fill="#16a34a" />
  <!-- Freezer handle right -->
  <rect x="338" y="116" width="14" height="56" rx="7" fill="#16a34a" />
  <!-- Fridge handle left -->
  <rect x="160" y="258" width="14" height="80" rx="7" fill="#16a34a" />
  <!-- Fridge handle right -->
  <rect x="338" y="258" width="14" height="80" rx="7" fill="#16a34a" />
  <!-- Hinge dots top -->
  <circle cx="256" cy="96" r="6" fill="#bbf7d0" />
  <!-- Hinge dots bottom -->
  <circle cx="256" cy="416" r="6" fill="#bbf7d0" />
  <!-- Small display/vent strip on freezer -->
  <rect x="200" y="155" width="112" height="26" rx="8" fill="#dcfce7" />
  <rect x="218" y="163" width="18" height="10" rx="4" fill="#22c55e" />
  <rect x="246" y="163" width="18" height="10" rx="4" fill="#22c55e" />
  <rect x="274" y="163" width="18" height="10" rx="4" fill="#22c55e" />
  <!-- Sparkle accent top right -->
  <circle cx="420" cy="90" r="14" fill="#bbf7d0" opacity="0.7" />
  <circle cx="420" cy="90" r="7" fill="#22c55e" />
  <!-- Sparkle accent bottom left -->
  <circle cx="92" cy="422" r="10" fill="#bbf7d0" opacity="0.6" />
  <circle cx="92" cy="422" r="5" fill="#22c55e" />
</svg>
