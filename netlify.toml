# Configuração de build para o Netlify
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL, VITE_SUPABASE_PROJECT_ID"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://nrfketkwajzkmrlkvoyd.supabase.co https://api.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://nrfketkwajzkmrlkvoyd.supabase.co; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://nrfketkwajzkmrlkvoyd.supabase.co https://api.stripe.com https://api.resend.com; frame-src 'self' https://js.stripe.com; object-src 'none'; media-src 'self'; worker-src 'self' blob:; manifest-src 'self';"
